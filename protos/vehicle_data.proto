// Subset of Tesla Fleet Telemetry vehicle_data.proto with verified field
// numbers. Source: github.com/teslamotors/fleet-telemetry/protos/vehicle_data.proto
// (verified June 2026 against the public main branch).
//
// Field numbers in this file are the wire-format tags Tesla uses — they must
// match the upstream proto exactly or decoding silently misidentifies fields.
// When adding fields, look up the number in the upstream enum, don't invent.
syntax = "proto3";
package telemetry.vehicle_data;

import "google/protobuf/timestamp.proto";

message Payload {
  repeated Datum data = 1;
  google.protobuf.Timestamp created_at = 2;
  string vin = 3;
  bool is_resend = 4;
}

message Datum {
  Field key = 1;
  Value value = 2;
}

// Tesla's Value oneof has 54 variants. We declare the ones we actually
// inspect; unknown variants are tolerated by protobufjs and just appear
// undefined on the decoded object.
message Value {
  oneof value {
    string string_value = 1;
    int32 int_value = 2;
    int64 long_value = 3;
    float float_value = 4;
    double double_value = 5;
    bool boolean_value = 6;
    LocationValue location_value = 7;
    ChargeState charging_value = 8;
    ShiftState shift_state_value = 9;
    Invalid invalid = 10;
    Doors door_value = 21;
    TimeValue time_value = 31;
    DetailedChargeStateValue detailed_charge_state_value = 32;
  }
}

message LocationValue {
  double latitude = 1;
  double longitude = 2;
}

// ChargeState enum used by ChargeState field (charging_value)
enum ChargeState {
  ChargeStateUnknown = 0;
  ChargeStateDisconnected = 1;
  ChargeStateNoPower = 2;
  ChargeStateStarting = 3;
  ChargeStateCharging = 4;
  ChargeStateComplete = 5;
  ChargeStateStopped = 6;
}

// DetailedChargeStateValue enum used by DetailedChargeState field
enum DetailedChargeStateValue {
  DetailedChargeStateUnknown = 0;
  DetailedChargeStateDisconnected = 1;
  DetailedChargeStateNoPower = 2;
  DetailedChargeStateStarting = 3;
  DetailedChargeStateCharging = 4;
  DetailedChargeStateComplete = 5;
  DetailedChargeStateStopped = 6;
}

enum ShiftState {
  ShiftStateUnknown = 0;
  ShiftStateInvalid = 1;
  ShiftStateP = 2;
  ShiftStateR = 3;
  ShiftStateN = 4;
  ShiftStateD = 5;
  ShiftStateSNA = 6;
}

enum Invalid {
  InvalidUnknown = 0;
  InvalidValue = 1;
}

message Doors {
  bool DriverFront = 1;
  bool PassengerFront = 2;
  bool DriverRear = 3;
  bool PassengerRear = 4;
  bool TrunkFront = 5;
  bool TrunkRear = 6;
}

message TimeValue {
  int32 hour = 1;
  int32 minute = 2;
  int32 second = 3;
}

// Field enum — VERIFIED numbers from upstream proto. Tesla has 260 fields
// total; we declare only the ones we currently decode. Unknown field numbers
// arriving in payloads are logged when TELEMETRY_DEBUG=1.
enum Field {
  FieldUnknown = 0;
  ChargeState = 2;
  VehicleSpeed = 4;
  Odometer = 5;
  Soc = 8;
  Gear = 10;
  Location = 21;
  RatedRange = 32;
  ChargeLimitSoc = 38;
  EstBatteryRange = 40;
  IdealBatteryRange = 41;
  BatteryLevel = 42;
  TimeToFullCharge = 43;
  ChargeAmps = 49;
  Locked = 59;
  VehicleName = 64;
  InsideTemp = 85;
  OutsideTemp = 86;
  DetailedChargeState = 179;
  ChargerVoltage = 184;
  HvacACEnabled = 196;
  ChargeRateMilePerHour = 256;
}
